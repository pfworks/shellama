<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sheLLaMa - Status</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1e1e1e; color: #00ff00; padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
        .nav { text-align: center; margin: 20px 0; }
        .nav a { color: #00ff00; border: 2px solid #00ff00; padding: 10px 24px; margin: 0 5px; text-decoration: none; border-radius: 3px; font-family: 'Courier New', monospace; font-size: 16px; }
        .nav a.active { background: #00ff00; color: #000; }
        .nav a:hover { background: #00ff0033; }
        .summary { background: #2b2b2b; border: 2px solid #00ff00; padding: 20px; margin: 20px 0; border-radius: 5px; }
        .summary-item { display: inline-block; margin: 10px 20px; font-size: 18px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #2b2b2b; color: #00ff00; border: 1px solid #00ff00; padding: 4px 12px; cursor: pointer; border-radius: 3px; font-family: 'Courier New', monospace; font-size: 12px; margin-left: 5px; }
        .btn:hover { background: #00ff0033; }
        .btn.danger { border-color: #ff4444; color: #ff4444; }
        .btn.danger:hover { background: #ff444433; }
        .toggle { cursor: pointer; font-size: 14px; padding: 6px 16px; border-radius: 3px; border: 1px solid; font-family: 'Courier New', monospace; }
        .toggle.on { background: #ff880033; border-color: #ff8800; color: #ff8800; }
        .toggle.off { background: #2b2b2b; border-color: #555; color: #555; }
        .refresh-info { text-align: center; margin-top: 20px; font-size: 14px; opacity: 0.7; }
        a { color: #00ff00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>sheLLaMa - System Status</h1>
        <div class="nav">
            <a href="/status" class="active">Overview</a>
            <a href="/backends">Backends</a>
            <a href="/stats">Stats</a>
            <a href="/costs">Costs</a>
        </div>

        <div class="summary">
            <div class="section-header">
                <div>
                    <div class="summary-item">Total Queue: <span id="total-queue">-</span></div>
                    <div class="summary-item">Active Backends: <span id="active-backends">-</span> / <span id="total-backends">-</span></div>
                    <div class="summary-item">Total Requests: <span id="total-requests">-</span></div>
                    <div class="summary-item">Total Tokens: <span id="total-tokens">-</span></div>
                </div>
                <div>
                    <button class="btn" class="btn admin-only" onclick="resetStats()">Clear Stats</button>
                </div>
            </div>
        </div>

        <div class="summary">
            <div class="section-header">
                <div>
                    <span style="font-size:16px">Cloud Fallback:</span>
                    <span id="fallback-toggle" class="toggle off" class="toggle off admin-only" id="fallback-toggle" onclick="toggleFallback()">OFF</span>
                    <span style="opacity:0.5; font-size:12px; margin-left:10px;">When ON, poor local responses auto-retry via cloud without client confirmation</span>
                </div>
            </div>
        </div>

        <div style="text-align:center; margin: 20px 0;">
            <button class="btn danger admin-only" onclick="resetAll()">Clear All Stats &amp; Costs</button>
        </div>
        <div class="refresh-info">Auto-refreshing every 2 seconds</div>
    </div>
    <script>
        let autoFallback = false;
        function updateStatus() {
            fetch('/queue-status').then(r => r.json()).then(data => {
                document.getElementById('total-queue').textContent = data.queue_size;
                document.getElementById('active-backends').textContent = data.active_backends;
                document.getElementById('total-backends').textContent = data.total_backends;
                document.getElementById('total-requests').textContent = (data.total_requests || 0).toLocaleString();
                document.getElementById('total-tokens').textContent = (data.total_tokens || 0).toLocaleString();
                autoFallback = data.auto_fallback || false;
                const el = document.getElementById('fallback-toggle');
                el.textContent = autoFallback ? 'ON' : 'OFF';
                el.className = 'toggle ' + (autoFallback ? 'on' : 'off');
            }).catch(() => {});
        }
        function toggleFallback() {
            fetch('/auto-fallback', {method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({enabled: !autoFallback})
            }).then(() => updateStatus());
        }
        function resetStats() {
            if (prompt('Type DELETE to clear total requests and tokens:') === 'DELETE')
                fetch('/reset-stats', {method:'POST'}).then(() => updateStatus());
        }
        function resetAll() {
            if (prompt('Type DELETE to clear ALL stats and cloud costs:') === 'DELETE')
                fetch('/reset-all', {method:'POST'}).then(() => updateStatus());
        }
        updateStatus();
        setInterval(updateStatus, 2000);
    </script>
<script>
function initAuth() {
    fetch("/sso/userinfo").then(r=>r.json()).then(d=>{
        const role = d.role || "admin";
        if (role !== "admin") {
            document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
        }
        const nav = document.querySelector(".nav");
        if (d.authenticated) {
            nav.insertAdjacentHTML("beforeend", ' <a href="/sso/logout" style="border-color:#ff8800;color:#ff8800">' + (d.user.name || d.user.email || "logout") + ' ↗</a>');
        } else if (d.role === "none") {
            nav.insertAdjacentHTML("beforeend", ' <a href="/sso/login" style="border-color:#ff8800;color:#ff8800">Login</a>');
        }
    }).catch(()=>{});
}
initAuth();
</script>
</body>
</html>
